<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>0️⃣ 零距离 - 对讲机 + 聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        .bg-stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,180,255,0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(255,60,60,0.08) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

        header {
            padding: 18px 20px 14px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 10px;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d4ff, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar { 
            margin-top: 5px; 
            font-size: 0.8rem; 
            color: #555; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
        }
        .status-dot { 
            width: 7px; 
            height: 7px; 
            border-radius: 50%; 
            background: #555; 
        }
        .status-bar.online .status-dot { 
            background: #4ade80; 
            box-shadow: 0 0 8px #4ade80; 
        }
        .status-bar.online .status-text { 
            color: #4ade80; 
        }

        .join-section {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
        }
        .join-section.hidden { display: none; }
        
        .join-form { 
            max-width: 420px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .input-group { 
            display: flex; 
            gap: 10px; 
        }
        
        .input-wrap { 
            flex: 1; 
            position: relative; 
        }
        
        .input-wrap .input-icon { 
            position: absolute; 
            left: 14px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 1rem; 
        }
        
        .input-wrap input {
            width: 100%; 
            padding: 13px 16px 13px 40px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: #fff; 
            font-size: 0.95rem; 
            outline: none;
            transition: all 0.3s;
        }
        
        .input-wrap input:focus { 
            border-color: #00d4ff; 
            background: rgba(0,212,255,0.05); 
        }
        
        .input-wrap input::placeholder { 
            color: #444; 
        }
        
        .btn-join {
            padding: 13px 22px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff; 
            border: none; 
            border-radius: 12px;
            font-size: 0.95rem; 
            font-weight: 700; 
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
        
        .btn-join:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 6px 25px rgba(0,212,255,0.4); 
        }

        .main-content {
            flex: 1;
            display: none;
            gap: 0;
            padding: 0;
            overflow: hidden;
        }

        .main-content.show { 
            display: flex;
        }

        .ptt-panel {
            flex: 0 0 280px;
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .walkie-talkie {
            width: 140px;
            height: 200px;
            background: #1a1a2e;
            border-radius: 15px;
            border: 2px solid #00d4ff;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }

        .screen {
            width: 100%;
            height: 60px;
            background: #0a0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #000;
            text-align: center;
        }

        .ptt-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        .ptt-button:active {
            background: linear-gradient(135deg, #cc0000, #ff0000);
            transform: scale(0.95);
        }

        .status-info {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .status-info div {
            margin: 4px 0;
        }

        .chat-panel {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 0;
            border: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-leave-room {
            background: rgba(255,100,100,0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255,100,100,0.3);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-leave-room:hover {
            background: rgba(255,100,100,0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }

        .message.other {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .message-user {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input-area input:focus {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }

        .chat-input-area input::placeholder {
            color: #555;
        }

        .chat-input-area button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .ptt-panel {
                flex: 0 0 auto;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 16px;
                gap: 16px;
            }

            .walkie-talkie {
                width: 100px;
                height: 150px;
                padding: 10px;
            }

            .screen {
                height: 45px;
                font-size: 10px;
            }

            .ptt-button {
                padding: 12px;
                font-size: 0.9rem;
            }

            .chat-panel {
                flex: 1;
                min-height: 300px;
            }

            .message {
                max-width: 85%;
            }

            .chat-header {
                padding: 12px;
            }

            .chat-messages {
                padding: 12px;
            }

            .chat-input-area {
                padding: 8px;
                gap: 6px;
            }

            .chat-input-area input {
                padding: 8px 10px;
                font-size: 0.85rem;
            }

            .chat-input-area button {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="bg-stars"></div>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">0️⃣</div>
                <h1>零距离</h1>
            </div>
            <div class="status-bar online">
                <div class="status-dot"></div>
                <span class="status-text">系统就绪</span>
            </div>
        </header>

        <!-- 加入区域 -->
        <div class="join-section" id="joinSection">
            <div class="join-form">
                <div class="input-group">
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="输入昵称" maxlength="20">
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrap">
                        <span class="input-icon">🔐</span>
                        <input type="text" id="room" placeholder="房间号" value="lobby" maxlength="20">
                    </div>
                    <button class="btn-join" onclick="joinRoom()">进入</button>
                </div>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content" id="mainContent">
            <!-- 对讲机面板 -->
            <div class="ptt-panel">
                <div class="walkie-talkie">
                    <div class="screen" id="screen">就绪</div>
                    <div style="flex: 1;"></div>
                </div>
                <button class="ptt-button" id="pttBtn" onmousedown="startPTT()" onmouseup="stopPTT()" ontouchstart="startPTT()" ontouchend="stopPTT()">
                    按住说话
                </button>
                <div class="status-info">
                    <div>在线: <span id="onlineCount">0</span> 人</div>
                    <div style="font-size: 0.8rem; margin-top: 4px;">端对端加密</div>
                </div>
            </div>

            <!-- 聊天面板 -->
            <div class="chat-panel">
                <div class="chat-header">
                    <h2>💬 聊天</h2>
                    <div class="header-right">
                        <div class="online-count">在线 <span id="chatOnlineCount">0</span> 人</div>
                        <button class="btn-leave-room" onclick="leaveRoom()">离开</button>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POCKETBASE_URL = 'http://127.0.0.1:8090';
        const MESSAGE_EXPIRE_TIME = 30000;
        
        let currentUser = null;
        let currentRoom = null;
        let onlineUsers = new Set();
        let messageCache = new Map();
        let pollInterval = null;
        let joinTime = null;

        // 进入房间
        async function joinRoom() {
            const username = document.getElementById('username').value.trim();
            const room = document.getElementById('room').value.trim();

            if (!username || !room) {
                alert('请输入昵称和房间号');
                return;
            }

            currentUser = username;
            currentRoom = room;
            joinTime = Date.now();
            onlineUsers.add(username);

            document.getElementById('joinSection').classList.add('hidden');
            document.getElementById('mainContent').classList.add('show');

            updateOnlineCount();
            startOnlineSync();
            startListening();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            try {
                const timestamp = Date.now();
                
                displayMessage(currentUser, content, true, timestamp);
                input.value = '';

                const response = await fetch(`${POCKETBASE_URL}/api/collections/messages/records`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        room: currentRoom,
                        user: currentUser,
                        content: content,
                        timestamp: timestamp
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log('消息已保存:', data.id);

                    setTimeout(() => {
                        deleteMessage(data.id);
                    }, MESSAGE_EXPIRE_TIME);
                }
            } catch (error) {
                console.error('发送失败:', error);
            }
        }

        // 显示消息
        function displayMessage(user, content, isOwn = false, timestamp = null) {
            const msgId = `${user}-${content}-${timestamp || Date.now()}`;
            
            if (messageCache.has(msgId)) return;
            messageCache.set(msgId, true);

            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            messageDiv.id = `msg-${msgId}`;
            
            const time = new Date(timestamp || Date.now()).toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });

            messageDiv.innerHTML = `
                <div class="message-user">${user} ${time}</div>
                <div>${content}</div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            setTimeout(() => {
                messageDiv.style.animation = 'fadeOut 1s ease';
                setTimeout(() => {
                    messageDiv.remove();
                    messageCache.delete(msgId);
                }, 1000);
            }, MESSAGE_EXPIRE_TIME - 1000);
        }

        // 删除消息
        async function deleteMessage(recordId) {
            try {
                await fetch(`${POCKETBASE_URL}/api/collections/messages/records/${recordId}`, {
                    method: 'DELETE'
                });
            } catch (error) {
                console.log('删除失败:', error);
            }
        }

        // 监听消息
        async function startListening() {
            try {
                const response = await fetch(
                    `${POCKETBASE_URL}/api/collections/messages/records?filter=(room='${currentRoom}')&sort=-timestamp&limit=50`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.items && data.items.length > 0) {
                        data.items.reverse().forEach(record => {
                            // 只显示进入房间后发送的消息
                            if (record.timestamp >= joinTime) {
                                displayMessage(record.user, record.content, record.user === currentUser, record.timestamp);
                            }
                        });
                    }
                }
            } catch (error) {
                console.log('加载消息失败:', error);
            }

            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(
                        `${POCKETBASE_URL}/api/collections/messages/records?filter=(room='${currentRoom}')&sort=-timestamp&limit=10`
                    );
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.items && data.items.length > 0) {
                            data.items.reverse().forEach(record => {
                                // 只显示进入房间后发送的消息
                                if (record.timestamp >= joinTime) {
                                    displayMessage(record.user, record.content, record.user === currentUser, record.timestamp);
                                }
                            });
                        }
                    }
                } catch (error) {
                    console.log('轮询失败:', error);
                }
            }, 2000);
        }

        // 更新在线人数
        function updateOnlineCount() {
            document.getElementById('onlineCount').textContent = onlineUsers.size;
            document.getElementById('chatOnlineCount').textContent = onlineUsers.size;
        }

        // 定期更新在线人数（模拟其他用户进入）
        function startOnlineSync() {
            setInterval(() => {
                updateOnlineCount();
            }, 1000);
        }

        // PTT 按钮
        function startPTT() {
            document.getElementById('pttBtn').style.background = 'linear-gradient(135deg, #cc0000, #ff0000)';
            document.getElementById('screen').textContent = '🎤 说话中...';
        }

        function stopPTT() {
            document.getElementById('pttBtn').style.background = 'linear-gradient(135deg, #ff6b6b, #ff8787)';
            document.getElementById('screen').textContent = '就绪';
        }

        // 回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (pollInterval) clearInterval(pollInterval);
            if (currentUser && currentRoom) {
                onlineUsers.delete(currentUser);
            }
        });

        // 离开房间
        function leaveRoom() {
            if (pollInterval) clearInterval(pollInterval);
            currentUser = null;
            currentRoom = null;
            joinTime = null;
            onlineUsers.clear();
            messageCache.clear();

            document.getElementById('mainContent').classList.remove('show');
            document.getElementById('joinSection').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('room').value = 'lobby';
            document.getElementById('messageInput').value = '';
            document.getElementById('chatMessages').innerHTML = '';
        }
    </script>
</body>
</html>
