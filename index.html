<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📻 加密对讲机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }
        header {
            padding: 16px 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        header h1 { font-size: 1.4rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .secure-badge {
            font-size: 0.7rem;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }
        .status-bar { margin-top: 6px; font-size: 0.82rem; color: #888; }
        .status-bar.online { color: #4ade80; }
        .status-bar.speaking { color: #f87171; animation: blink 0.6s infinite; }
        .status-bar.receiving { color: #60a5fa; animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .join-section { padding: 16px 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .join-section.hidden { display: none; }
        .input-row { display: flex; gap: 10px; max-width: 420px; margin: 0 auto; }
        .input-row input {
            flex: 1; padding: 13px 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #fff; font-size: 1rem; outline: none;
            transition: border-color 0.3s;
        }
        .input-row input:focus { border-color: #00d4ff; }
        .input-row input::placeholder { color: #555; }
        .btn { padding: 13px 22px; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-join { background: linear-gradient(90deg, #00d4ff, #7c3aed); color: #fff; }
        .btn-join:active { transform: scale(0.97); }
        .btn-leave { background: rgba(255,100,100,0.2); color: #f87171; border: 1px solid rgba(255,100,100,0.3); font-size: 0.85rem; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        .channel-info {
            display: none; padding: 10px 20px;
            background: rgba(0,212,255,0.08);
            border-bottom: 1px solid rgba(0,212,255,0.15);
            align-items: center; justify-content: space-between;
        }
        .channel-info.show { display: flex; }
        .channel-name { font-size: 0.9rem; color: #00d4ff; }
        .online-count { font-size: 0.82rem; color: #888; }
        .online-count span { color: #4ade80; font-weight: 600; }

        .talk-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px 20px;
        }
        .talk-btn {
            width: 190px; height: 190px; border-radius: 50%; border: none;
            background: radial-gradient(circle at 35% 35%, #2d2d5a, #1a1a2e);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 -4px 16px rgba(0,0,0,0.4), inset 0 4px 16px rgba(255,255,255,0.04), 0 0 0 3px rgba(255,255,255,0.05);
            cursor: pointer; transition: all 0.12s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .talk-btn .icon { font-size: 3.8rem; transition: transform 0.12s; }
        .talk-btn .label { font-size: 0.95rem; color: #666; font-weight: 500; }
        .talk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .talk-btn.active {
            background: radial-gradient(circle at 35% 35%, #cc2222, #880000);
            box-shadow: 0 0 60px rgba(255,50,50,0.5), 0 8px 32px rgba(0,0,0,0.5);
            transform: scale(0.96);
        }
        .talk-btn.active .icon { transform: scale(1.1); }
        .talk-btn.active .label { color: #ffaaaa; }
        .talk-btn.receiving-audio {
            box-shadow: 0 0 60px rgba(96,165,250,0.5), 0 8px 32px rgba(0,0,0,0.5);
        }
        .talk-hint { margin-top: 24px; font-size: 0.82rem; color: #444; text-align: center; line-height: 1.8; }
        .encrypt-indicator {
            display: flex; align-items: center; gap: 6px;
            margin-top: 16px; font-size: 0.78rem; color: #4ade80;
        }
        .encrypt-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

        .log-section {
            background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.08);
            padding: 12px 16px; max-height: 130px; overflow-y: auto;
        }
        .log-section::-webkit-scrollbar { width: 3px; }
        .log-section::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .log-entry { font-size: 0.75rem; padding: 3px 0; color: #555; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .log-entry.speak { color: #4ade80; }
        .log-entry.join { color: #60a5fa; }
        .log-entry.leave { color: #f87171; }
        .log-entry.error { color: #f87171; }
        .log-entry.secure { color: #a78bfa; }

        .toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,20,0.95); color: #fff;
            padding: 11px 22px; border-radius: 12px; font-size: 0.88rem;
            z-index: 1000; animation: toastIn 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-15px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>

<header>
    <h1>📻 对讲机 <span class="secure-badge">🔒 端对端加密</span></h1>
    <div class="status-bar" id="status">连接中...</div>
</header>

<div class="join-section" id="joinSection">
    <div class="input-row">
        <input type="text" id="channelInput" placeholder="输入频道号（如: family2026）" maxlength="30" autocomplete="off">
        <button class="btn btn-join" onclick="joinChannel()">加入</button>
    </div>
</div>

<div class="channel-info" id="channelInfo">
    <div class="channel-name" id="channelName">📻 频道: -</div>
    <div style="display:flex;align-items:center;gap:12px">
        <div class="online-count">在线 <span id="userCount">1</span> 人</div>
        <button class="btn-leave" onclick="leaveChannel()">离开</button>
    </div>
</div>

<div class="talk-section">
    <button class="talk-btn" id="talkBtn" disabled>
        <span class="icon">🎙️</span>
        <span class="label">按住说话</span>
    </button>
    <div class="talk-hint" id="talkHint">请先加入频道</div>
    <div class="encrypt-indicator" id="encryptIndicator" style="display:none">
        <div class="encrypt-dot"></div>
        端对端加密已启用
    </div>
</div>

<div class="log-section" id="logSection">
    <div class="log-entry">系统就绪...</div>
</div>

<script>
    // ===== 配置 =====
    const SIGNAL_SERVER = 'wss://walkie-signal.508002830.workers.dev/';

    // ===== 加密工具 =====
    const Crypto = {
        async deriveKey(channelName) {
            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw', enc.encode(channelName + '_walkie_salt_2026'),
                { name: 'PBKDF2' }, false, ['deriveKey']
            );
            return window.crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: enc.encode('walkie_talkie_iv'), iterations: 100000, hash: 'SHA-256' },
                keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        },
        async hashChannel(name) {
            const enc = new TextEncoder();
            const hash = await window.crypto.subtle.digest('SHA-256', enc.encode(name + '_channel'));
            return Array.from(new Uint8Array(hash)).slice(0, 12).map(b => b.toString(16).padStart(2,'0')).join('');
        },
        async encrypt(key, data) {
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
            const result = new Uint8Array(12 + encrypted.byteLength);
            result.set(iv, 0);
            result.set(new Uint8Array(encrypted), 12);
            return result.buffer;
        },
        async decrypt(key, data) {
            const iv = new Uint8Array(data, 0, 12);
            const encrypted = new Uint8Array(data, 12);
            return window.crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
        }
    };

    // ===== 状态 =====
    let ws = null;
    let myId = 'user_' + Math.random().toString(36).substr(2, 10);
    let currentChannel = '';
    let cryptoKey = null;
    let peers = new Map(); // peerId -> RTCPeerConnection
    let localStream = null;
    let isTalking = false;
    let mediaRecorder = null;
    let audioChunks = [];

    // ===== 元素 =====
    const statusEl = document.getElementById('status');
    const joinSection = document.getElementById('joinSection');
    const channelInfo = document.getElementById('channelInfo');
    const channelNameEl = document.getElementById('channelName');
    const userCountEl = document.getElementById('userCount');
    const talkBtn = document.getElementById('talkBtn');
    const talkHint = document.getElementById('talkHint');
    const encryptIndicator = document.getElementById('encryptIndicator');
    const logSection = document.getElementById('logSection');

    // ===== 日志 =====
    function addLog(msg, type = '') {
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        const t = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        entry.textContent = `[${t}] ${msg}`;
        logSection.insertBefore(entry, logSection.firstChild);
    }

    function showToast(msg) {
        document.querySelector('.toast')?.remove();
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    // ===== WebSocket 信令 =====
    function connectSignal(onReady) {
        statusEl.textContent = '连接服务器中...';
        ws = new WebSocket(SIGNAL_SERVER);

        ws.onopen = () => {
            addLog('已连接到信令服务器', 'join');
            statusEl.textContent = '已就绪';
            statusEl.className = 'status-bar online';
            if (onReady) onReady();
        };

        ws.onmessage = async (event) => {
            try {
                const msg = JSON.parse(event.data);
                await handleSignal(msg);
            } catch(e) {}
        };

        ws.onclose = () => {
            addLog('信令服务器断开，3秒后重连...', 'error');
            statusEl.textContent = '重连中...';
            statusEl.className = 'status-bar';
            setTimeout(() => connectSignal(), 3000);
        };

        ws.onerror = () => {
            addLog('连接错误', 'error');
        };
    }

    function sendSignal(msg) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(msg));
        }
    }

    // ===== 处理信令 =====
    async function handleSignal(msg) {
        switch(msg.type) {
            case 'peers':
                // 收到频道内已有用户列表，主动发起连接
                addLog(`频道内已有 ${msg.peers.length} 人`, 'join');
                for (const peerId of msg.peers) {
                    await createOffer(peerId);
                }
                updateCount();
                break;

            case 'peer_joined':
                // 有新用户加入，等待对方发起连接
                addLog('新用户加入频道', 'join');
                updateCount();
                break;

            case 'peer_left':
                // 用户离开
                if (peers.has(msg.peerId)) {
                    peers.get(msg.peerId).close();
                    peers.delete(msg.peerId);
                }
                addLog('用户离开频道', 'leave');
                updateCount();
                break;

            case 'count':
                userCountEl.textContent = msg.count;
                break;

            case 'signal':
                // WebRTC 信令转发
                await handleWebRTCSignal(msg.from, msg.signal);
                break;
        }
    }

    // ===== WebRTC =====
    const RTC_CONFIG = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' }
        ]
    };

    function createPeerConnection(peerId) {
        const pc = new RTCPeerConnection(RTC_CONFIG);
        peers.set(peerId, pc);

        // 添加本地音频流
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        // 收到远程音频
        pc.ontrack = (event) => {
            addLog('收到对方音频流', 'join');
            const audio = new Audio();
            audio.srcObject = event.streams[0];
            audio.play().catch(() => {});

            talkBtn.classList.add('receiving-audio');
            statusEl.textContent = '🔵 对方正在说话...';
            statusEl.className = 'status-bar receiving';

            event.streams[0].getTracks()[0].onended = () => {
                talkBtn.classList.remove('receiving-audio');
                if (!isTalking) {
                    statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
                    statusEl.className = 'status-bar online';
                }
            };
        };

        // ICE 候选
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal({
                    type: 'signal',
                    to: peerId,
                    signal: { type: 'candidate', candidate: event.candidate }
                });
            }
        };

        pc.onconnectionstatechange = () => {
            addLog('连接状态: ' + pc.connectionState, pc.connectionState === 'connected' ? 'join' : '');
            if (pc.connectionState === 'connected') {
                showToast('✅ 已与对方建立连接！');
                updateCount();
            }
        };

        return pc;
    }

    async function createOffer(peerId) {
        const pc = createPeerConnection(peerId);
        const offer = await pc.createOffer({ offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        sendSignal({
            type: 'signal',
            to: peerId,
            signal: { type: 'offer', sdp: offer }
        });
        addLog('发起连接请求...', '');
    }

    async function handleWebRTCSignal(fromId, signal) {
        if (signal.type === 'offer') {
            const pc = createPeerConnection(fromId);
            await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal({
                type: 'signal',
                to: fromId,
                signal: { type: 'answer', sdp: answer }
            });
            addLog('接受连接请求', '');
        } else if (signal.type === 'answer') {
            const pc = peers.get(fromId);
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
        } else if (signal.type === 'candidate') {
            const pc = peers.get(fromId);
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
        }
    }

    function updateCount() {
        const connected = Array.from(peers.values()).filter(pc => pc.connectionState === 'connected').length;
        userCountEl.textContent = connected + 1;
    }

    // ===== 加入频道 =====
    async function joinChannel() {
        const channel = document.getElementById('channelInput').value.trim();
        if (!channel) { showToast('请输入频道号'); return; }
        if (channel.length < 4) { showToast('频道号至少4位'); return; }

        // 保存频道号到本地
        localStorage.setItem('lastChannel', channel);

        showToast('正在加入...');
        addLog('初始化加密...', 'secure');

        cryptoKey = await Crypto.deriveKey(channel);
        const hashedChannel = await Crypto.hashChannel(channel);
        currentChannel = channel;

        addLog('🔒 AES-256 加密就绪', 'secure');

        // 获取麦克风
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
                video: false
            });
            addLog('麦克风就绪', '');
        } catch(e) {
            showToast('❌ 请允许麦克风权限');
            addLog('麦克风权限被拒绝', 'error');
            return;
        }

        // 连接信令服务器并加入频道
        const doJoin = () => {
            sendSignal({ type: 'join', channel: hashedChannel, peerId: myId });

            joinSection.classList.add('hidden');
            channelInfo.classList.add('show');
            channelNameEl.textContent = '📻 ' + channel;
            talkBtn.disabled = false;
            talkHint.textContent = '按住大按钮说话 · 松开停止\nPC端可按空格键';
            encryptIndicator.style.display = 'flex';
            statusEl.textContent = '📻 ' + channel + ' · 空闲';
            statusEl.className = 'status-bar online';
            addLog('已加入频道: ' + channel, 'join');
            showToast('✅ 已加入: ' + channel);
        };

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            connectSignal(doJoin);
        } else {
            doJoin();
        }
    }

    // ===== 离开频道 =====
    function leaveChannel() {
        if (isTalking) stopTalking();

        peers.forEach(pc => pc.close());
        peers.clear();

        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }

        currentChannel = '';
        joinSection.classList.remove('hidden');
        channelInfo.classList.remove('show');
        talkBtn.disabled = true;
        talkHint.textContent = '请先加入频道';
        encryptIndicator.style.display = 'none';
        statusEl.textContent = '已就绪';
        statusEl.className = 'status-bar online';
        addLog('已离开频道', 'leave');
        showToast('已离开频道');
    }

    // ===== 说话逻辑 =====
    function startTalking() {
        if (isTalking || !localStream || talkBtn.disabled) return;
        isTalking = true;

        // 取消静音（WebRTC 通过 track enabled 控制）
        localStream.getAudioTracks().forEach(track => { track.enabled = true; });

        talkBtn.classList.add('active');
        talkBtn.querySelector('.icon').textContent = '🔴';
        talkBtn.querySelector('.label').textContent = '正在说话...';
        statusEl.textContent = '🔴 我正在说话...';
        statusEl.className = 'status-bar speaking';
        addLog('开始说话', 'speak');
    }

    function stopTalking() {
        if (!isTalking) return;
        isTalking = false;

        // 静音（不断开连接，只是静音）
        localStream.getAudioTracks().forEach(track => { track.enabled = false; });

        talkBtn.classList.remove('active');
        talkBtn.querySelector('.icon').textContent = '🎙️';
        talkBtn.querySelector('.label').textContent = '按住说话';
        statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
        statusEl.className = 'status-bar online';
        addLog('停止说话', 'speak');
    }

    // ===== 按钮事件 =====
    talkBtn.addEventListener('mousedown', e => { e.preventDefault(); startTalking(); });
    talkBtn.addEventListener('mouseup', e => { e.preventDefault(); stopTalking(); });
    talkBtn.addEventListener('mouseleave', () => { if (isTalking) stopTalking(); });
    talkBtn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); }, { passive: false });
    talkBtn.addEventListener('touchend', e => { e.preventDefault(); stopTalking(); }, { passive: false });
    talkBtn.addEventListener('touchcancel', e => { e.preventDefault(); stopTalking(); }, { passive: false });

    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault(); startTalking();
        }
    });
    document.addEventListener('keyup', e => {
        if (e.code === 'Space') { e.preventDefault(); stopTalking(); }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden && isTalking) stopTalking();
    });

    document.getElementById('channelInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') joinChannel();
    });

    // 自动填入上次的频道号
    const lastChannel = localStorage.getItem('lastChannel');
    if (lastChannel) document.getElementById('channelInput').value = lastChannel;

    // ===== 启动 =====
    connectSignal();
</script>
</body>
</html>
