    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;

            display: flex;

        }

        .bg-stars {

        }

        .container { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

        header {
            padding: 18px 20px 14px;

        .status-bar { margin-top: 5px; font-size: 0.8rem; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: all 0.3s; }
        .status-bar.online .status-dot { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .status-bar.online .status-text { color: #4ade80; }
        .status-bar.connecting .status-dot { background: #facc15; box-shadow: 0 0 8px #facc15; animation: pulse 1s infinite; }
        .status-bar.connecting .status-text { color: #facc15; }
        .status-bar.error .status-dot { background: #ff6b6b; box-shadow: 0 0 8px #ff6b6b; }
        .status-bar.error .status-text { color: #ff6b6b; }

        .join-form { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        }

        .ptt-section {

        .wave-ring:nth-child(2) { width: 180px; height: 180px; animation-delay: 0.5s; }
        .wave-ring:nth-child(3) { width: 200px; height: 200px; animation-delay: 1s; }
        @keyframes waveExpand {

        @media (max-width: 768px) {
            .main-content.show { flex-direction: column; }
            .ptt-section { flex: 0 0 auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px; gap: 12px; }
            .wave-container { width: 120px; height: 120px; margin-bottom: 12px; }
            .wave-ring:nth-child(1) { width: 90px; height: 90px; }
            .wave-ring:nth-child(2) { width: 105px; height: 105px; }
            .wave-ring:nth-child(3) { width: 120px; height: 120px; }
            .talk-btn { width: 90px; height: 90px; }
            .talk-btn .icon { font-size: 2rem; }
            .talk-btn .label { font-size: 0.65rem; }
            .ptt-info { margin-top: 8px; font-size: 0.75rem; }
            .chat-header { padding: 8px 10px; }
            .chat-header h2 { font-size: 0.85rem; }
            .chat-messages { padding: 10px; min-height: 120px; padding-bottom: 70px; }
            .message { max-width: 85%; font-size: 0.85rem; }
            .chat-input-area { padding: 10px; gap: 6px; }
            .chat-input-area input { padding: 8px 12px; font-size: 0.85rem; }
            .chat-input-area button { padding: 8px 12px; font-size: 0.8rem; }
            .online-count { padding: 3px 8px; font-size: 0.7rem; }
            .btn-leave { padding: 4px 8px; font-size: 0.7rem; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message { animation: slideIn 0.3s ease; }
    </style>
</head>

// ==================== 增强 ICE 配置 ====================
// 国内 STUN 服务器（优先）+ 免费 TURN 中继（保底）
const RTC_CONFIG = {
    iceServers: [
        // 国内 STUN
        { urls: 'stun:stun.qq.com:3478' },
        { urls: 'stun:stun.aliyun.com:3478' },

// 连接参数
const ICE_CONNECTION_TIMEOUT = 15000;  // 15秒超时
const MAX_RECONNECT_ATTEMPTS = 3;       // 最多重连3次
const RECONNECT_BASE_DELAY = 2000;       // 基础重连延迟2秒

// ==================== 全局状态 ====================
const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

let myId = 'u_' + Math.random().toString(36).substr(2, 8);
let myColor = '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
let myName = '用户' + myId.substr(2, 4);
let currentRoom = '';
let sbChannel = null;
let peers = new Map();
let localStream = null;
let isTalking = false;
let onlineUsers = new Map();
let messageCache = new Set();
let pollInterval = null;
let joinTime = null;
let connectedPeers = new Set();

const talkBtn = document.getElementById('talkBtn');
const statusBar = document.getElementById('statusBar');
const connectionInfo = document.getElementById('connectionInfo');

// ==================== 工具函数 ====================
function setStatus(state, text) {
    statusBar.className = 'status-bar ' + state;
    statusBar.querySelector('.status-text').textContent = text;
}

function updateConnectionInfo(text, color) {
    color = color || '#888';
    connectionInfo.textContent = text;
    connectionInfo.style.color = color;
}

async function hashChannel(ch) {
    const enc = new TextEncoder();
    const hash = await crypto.subtle.digest('SHA-256', enc.encode(ch + '_wt'));
    return 'wt_' + Array.from(new Uint8Array(hash)).slice(0,10).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function updateOnlineCount() {
    var count = onlineUsers.size + 1;
    document.getElementById('onlineCount').textContent = count;
    document.getElementById('chatOnlineCount').textContent = count;
}

function sendSignal(to, signal) {
    if (sbChannel) {
        sbChannel.send({ type: 'broadcast', event: 'signal', payload: { from: myId, to: to, signal: signal } });
    }
}

function broadcast(event, payload) {
    if (sbChannel) {
        sbChannel.send({ type: 'broadcast', event: event, payload: { from: myId, to: null, ...payload } });
    }
}

// ==================== 核心：WebRTC 增强版 ====================

function createPC(peerId) {
    if (peers.has(peerId)) return peers.get(peerId);
    
    var pc = new RTCPeerConnection(RTC_CONFIG);
    var pendingCandidates = [];
    
    peers.set(peerId, {
        pc: pc,
        pendingCandidates: pendingCandidates,
        reconnectAttempts: 0,
        timeoutId: null,
        iceGatheringDone: false
    });

    // 添加本地音频轨道
    if (localStream) {
        localStream.getTracks().forEach(function(t) { pc.addTrack(t, localStream); });
    }

    // 接收远程音频
    pc.ontrack = function(e) {
        var audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play().catch(function() {});
    };

    // ICE 候选收集
    pc.onicecandidate = function(e) {
        if (e.candidate) {
            // 收集完成后再发送，避免时序问题
            if (pc.iceGatheringState === 'complete') {
                sendSignal(peerId, { type: 'candidate', candidate: e.candidate, end: true });
            }
        }
    };

    // ICE 收集状态
    pc.onicegatheringstatechange = function() {
        var peerData = peers.get(peerId);
        if (!peerData) return;
        
        if (pc.iceGatheringState === 'complete') {
            peerData.iceGatheringDone = true;
            // 发送所有待处理的 candidates
            peerData.pendingCandidates.forEach(function(cand) {
                sendSignal(peerId, { type: 'candidate', candidate: cand });
            });
            peerData.pendingCandidates = [];
        }
    };

    // 连接状态监控（核心修复）
    pc.onconnectionstatechange = function() {
        var peerData = peers.get(peerId);
        if (!peerData) return;
        
        console.log('[WebRTC] ' + peerId + ' 状态: ' + pc.connectionState);
        
        switch (pc.connectionState) {
            case 'connected':
                connectedPeers.add(peerId);
                peerData.reconnectAttempts = 0;
                if (peerData.timeoutId) clearTimeout(peerData.timeoutId);
                updateTalkBtnState();
                setStatus('online', '已连接');
                updateConnectionInfo('✓ 语音就绪', '#4ade80');
                break;
                
            case 'disconnected':
            case 'failed':
                connectedPeers.delete(peerId);
                updateTalkBtnState();
                setStatus('connecting', '连接中断');
                updateConnectionInfo('⚡ 正在重连...', '#facc15');
                handleReconnect(peerId);
                break;
                
            case 'closed':
                connectedPeers.delete(peerId);
                updateTalkBtnState();
                break;
        }
    };

    // ICE 连接状态
    pc.oniceconnectionstatechange = function() {
        console.log('[WebRTC] ICE 状态: ' + pc.iceConnectionState + ' (' + peerId + ')');
    };

    return pc;
}

function updateTalkBtnState() {
    if (connectedPeers.size > 0) {
        talkBtn.disabled = false;
        talkBtn.querySelector('.label').textContent = '按住说话';
    } else {
        talkBtn.disabled = true;
        talkBtn.querySelector('.label').textContent = '等待连接...';
    }
}

// 自动重连逻辑
async function handleReconnect(peerId) {
    var peerData = peers.get(peerId);
    if (!peerData) return;
    
    // 清除超时
    if (peerData.timeoutId) clearTimeout(peerData.timeoutId);
    
    // 检查重连次数
    if (peerData.reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
        console.log('[WebRTC] ' + peerId + ' 重连次数用尽');
        updateConnectionInfo('✗ 连接失败', '#ff6b6b');
        setStatus('error', '连接失败');
        return;
    }
    
    peerData.reconnectAttempts++;
    var delay = RECONNECT_BASE_DELAY * Math.pow(2, peerData.reconnectAttempts - 1);
    
    console.log('[WebRTC] ' + peerId + ' 第' + peerData.reconnectAttempts + '次重连，' + delay + 'ms后');
    
    peerData.timeoutId = setTimeout(async function() {
        // 关闭旧连接
        if (peerData.pc) {
            peerData.pc.close();
        }
        
        // 重建连接
        createPC(peerId);
        await makeOffer(peerId);
    }, delay);
}

// 改进的信号处理
async function handleSignal(from, signal) {
    if (!peers.has(from)) {
        createPC(from);
    }
    
    var peerData = peers.get(from);
    var pc = peerData.pc;
    
    if (signal.type === 'offer') {
        await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
        
        // 先处理积压的 candidates
        while (peerData.pendingCandidates.length > 0) {
            var cand = peerData.pendingCandidates.shift();
            try {
                await pc.addIceCandidate(new RTCIceCandidate(cand));
            } catch (e) {
                console.log('[WebRTC] 添加积压candidate失败:', e);
            }
        }
        
        var answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        // 发送 answer 和待处理的 candidates
        sendSignal(from, { 
            type: 'answer', 
            sdp: answer, 
            candidates: peerData.pendingCandidates.slice()
        });
        peerData.pendingCandidates = [];
        
    } else if (signal.type === 'answer') {
        await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
        
        // 处理附带的 candidates
        if (signal.candidates && signal.candidates.length > 0) {
            for (var i = 0; i < signal.candidates.length; i++) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(signal.candidates[i]));
                } catch (e) {
                    console.log('[WebRTC] 添加candidate失败:', e);
                }
            }
        }
        
    } else if (signal.type === 'candidate') {
        if (pc.remoteDescription && pc.remoteDescription.type) {
            // remoteDescription 已设置，直接添加
            try {
                await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
            } catch (e) {
                console.log('[WebRTC] 添加candidate失败:', e);
            }
        } else {
            // 还没设置好，缓冲
            peerData.pendingCandidates.push(signal.candidate);
        }
    }
}

// 发起连接（带超时）
async function makeOffer(peerId) {
    var peerData = peers.get(peerId);
    if (!peerData) return;
    
    var pc = peerData.pc;
    
    // 设置连接超时
    if (peerData.timeoutId) clearTimeout(peerData.timeoutId);
    peerData.timeoutId = setTimeout(function() {
        if (pc.connectionState !== 'connected') {
            console.log('[WebRTC] ' + peerId + ' 连接超时');
            pc.close();
            handleReconnect(peerId);
        }
    }, ICE_CONNECTION_TIMEOUT);
    
    try {
        var offer = await pc.createOffer({ offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        sendSignal(peerId, { type: 'offer', sdp: offer });
    } catch (e) {
        console.log('[WebRTC] 创建offer失败:', e);
    }
}

// ==================== 房间管理 ====================
async function joinRoom() {
    var username = document.getElementById('username').value.trim();
    var room = document.getElementById('room').value.trim();
    if (!username || !room) { alert('请输入昵称和房间号'); return; }

    myName = username;
    currentRoom = room;
    joinTime = Date.now();
    setStatus('connecting', '正在加入...');

    // 获取麦克风权限
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            audio: { 
                echoCancellation: true, 
                noiseSuppression: true, 
                autoGainControl: true 
            },
            video: false
        });
        // 初始状态：静音
        localStream.getAudioTracks().forEach(function(t) { t.enabled = false; });
    } catch(e) {
        alert('请允许麦克风权限');
        setStatus('error', '权限被拒绝');
        return;
    }

    var chHash = await hashChannel(room);
    sbChannel = sb.channel(chHash, { config: { broadcast: { self: false } } });

    // 信号交换
    sbChannel.on('broadcast', { event: 'signal' }, function(event) {
        var payload = event.payload;
        if (payload.to === myId) {
            handleSignal(payload.from, payload.signal);
        }
    });

    // 用户加入
    sbChannel.on('broadcast', { event: 'join' }, function(event) {
        var payload = event.payload;
        if (payload.from !== myId) {
            onlineUsers.set(payload.from, { name: payload.name, color: payload.color });
            updateOnlineCount();
            makeOffer(payload.from);
            broadcast('here', { name: myName, color: myColor, to: payload.from });
        }
    });

    // 用户响应
    sbChannel.on('broadcast', { event: 'here' }, function(event) {
        var payload = event.payload;
        if ((payload.to === myId || !payload.to) && payload.from !== myId) {
            onlineUsers.set(payload.from, { name: payload.name, color: payload.color });
            updateOnlineCount();
        }
    });

    // 用户离开
    sbChannel.on('broadcast', { event: 'leave' }, function(event) {
        var payload = event.payload;
        if (payload.from !== myId) {
            onlineUsers.delete(payload.from);
            if (peers.has(payload.from)) {
                var p = peers.get(payload.from);
                if (p.timeoutId) clearTimeout(p.timeoutId);
                p.pc.close();
                peers.delete(payload.from);
            }
            connectedPeers.delete(payload.from);
            updateOnlineCount();
            updateTalkBtnState();
        }
    });

    // 订阅频道
    sbChannel.subscribe(function(status) {
        if (status === 'SUBSCRIBED') {
            broadcast('join', { name: myName, color: myColor });
            document.getElementById('joinSection').classList.add('hidden');
            document.getElementById('mainContent').classList.add('show');
            updateOnlineCount();
            startListening();
            setStatus('connecting', '等待对方...');
            updateConnectionInfo('等待连接...', '#888');
        }
    });
}

function leaveRoom() {
    if (pollInterval) clearInterval(pollInterval);
    if (isTalking) stopTalking();
    
    broadcast('leave', {});
    
    peers.forEach(function(peerData, peerId) {
        if (peerData.timeoutId) clearTimeout(peerData.timeoutId);
        peerData.pc.close();
    });
    peers.clear();
    connectedPeers.clear();
    onlineUsers.clear();
    
    if (sbChannel) { sb.removeChannel(sbChannel); sbChannel = null; }
    if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
    currentRoom = '';
    
    document.getElementById('mainContent').classList.remove('show');
    document.getElementById('joinSection').classList.remove('hidden');
    document.getElementById('username').value = '';
    document.getElementById('room').value = 'lobby';
    document.getElementById('messageInput').value = '';
    document.getElementById('chatMessages').innerHTML = '';
    talkBtn.disabled = true;
    talkBtn.querySelector('.label').textContent = '等待连接...';
    updateOnlineCount();
    setStatus('online', '系统就绪');
    updateConnectionInfo('连接中...', '#888');
}

// ==================== 语音控制 ====================
function startTalking() {
    if (isTalking || !localStream || talkBtn.disabled) return;
    isTalking = true;
    localStream.getAudioTracks().forEach(function(t) { t.enabled = true; });
    talkBtn.classList.add('active');
    talkBtn.querySelector('.label').textContent = '正在说话...';
}

function stopTalking() {
    if (!isTalking) return;
    isTalking = false;
    localStream.getAudioTracks().forEach(function(t) { t.enabled = false; });
    talkBtn.classList.remove('active');
    talkBtn.querySelector('.label').textContent = connectedPeers.size > 0 ? '按住说话' : '等待连接...';
}

// 鼠标事件
talkBtn.addEventListener('mousedown', function(e) { e.preventDefault(); startTalking(); });
talkBtn.addEventListener('mouseup', function(e) { e.preventDefault(); stopTalking(); });
talkBtn.addEventListener('mouseleave', function() { if (isTalking) stopTalking(); });

// 触摸事件
talkBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startTalking(); }, { passive: false });
talkBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopTalking(); }, { passive: false });

// 键盘快捷键（空格键）
document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') { 
        e.preventDefault(); 
        startTalking(); 
    }
});
document.addEventListener('keyup', function(e) { 
    if (e.code === 'Space') { 
        e.preventDefault(); 
        stopTalking(); 
    } 
});

// ==================== 消息功能 ====================
async function sendMessage() {
    var input = document.getElementById('messageInput');
    var content = input.value.trim();
    if (!content) return;

    var timestamp = Date.now();
    displayMessage(myName, content, true, timestamp);
    input.value = '';

    try {
        var result = await sb.from('messages').insert({
            room: currentRoom,
            user: myName,
            content: content,
            timestamp: timestamp,
            expire_at: new Date(timestamp + 300000).toISOString()  // 5分钟后过期
        });
        if (result.error) console.log('发送失败:', result.error.message);
    } catch (error) {
        console.log('发送失败:', error);
    }
}

function displayMessage(user, content, isOwn, timestamp) {
    isOwn = isOwn || false;
    timestamp = timestamp || Date.now();
    
    var msgId = user + '-' + content + '-' + timestamp;
    if (messageCache.has(msgId)) return;
    messageCache.add(msgId);
    
    // 限制缓存大小
    if (messageCache.size > 100) {
        var arr = Array.from(messageCache);
        messageCache = new Set(arr.slice(-50));
    }

    var chatMessages = document.getElementById('chatMessages');
    var messageDiv = document.createElement('div');
    messageDiv.className = 'message ' + (isOwn ? 'own' : 'other');
    var time = new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    messageDiv.innerHTML = '<div class="message-user">' + user + ' ' + time + '</div><div>' + content + '</div>';
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// 启动消息监听
async function startListening() {
    try {
        var result = await sb.from('messages')
            .select('*')
            .eq('room', currentRoom)
            .order('timestamp', { ascending: true })
            .limit(50);
        
        if (!result.error && result.data) {
            result.data.forEach(function(record) {
                if (record.timestamp >= joinTime) {
                    displayMessage(record.user, record.content, record.user === myName, record.timestamp);
                }
            });
        }
    } catch (error) {
        console.log('加载消息失败:', error);
    }

    // 定时轮询（优化：增加间隔，减少数据库压力）
    pollInterval = setInterval(async function() {
        try {
            var result = await sb.from('messages')
                .select('*')
                .eq('room', currentRoom)
                .order('timestamp', { ascending: true })
                .limit(20);
            
            if (!result.error && result.data) {
                result.data.forEach(function(record) {
                    if (record.timestamp >= joinTime) {
                        displayMessage(record.user, record.content, record.user === myName, record.timestamp);
                    }
                });
            }
        } catch (error) {
            console.log('轮询失败:', error);
        }
    }, 3000);  // 从2秒改为3秒
}

function handleKeyPress(event) {
    if (event.key === 'Enter') sendMessage();
}

// 页面关闭时清理
window.addEventListener('beforeunload', function() {
    if (currentRoom) leaveRoom();
});

// 回车键加入房间
document.getElementById('room').addEventListener('keydown', function(e) { if (e.key === 'Enter') joinRoom(); });
</script>
