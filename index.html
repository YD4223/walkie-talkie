<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>📻 加密对讲机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        header {
            padding: 16px 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        header h1 { font-size: 1.4rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .secure-badge { font-size: 0.7rem; background: linear-gradient(90deg, #4ade80, #22c55e); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
        .status-bar { margin-top: 6px; font-size: 0.82rem; color: #888; }
        .status-bar.online { color: #4ade80; }
        .status-bar.speaking { color: #f87171; animation: blink 0.6s infinite; }
        .status-bar.receiving { color: #60a5fa; animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .join-section { padding: 16px 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .join-section.hidden { display: none; }
        .input-row { display: flex; gap: 10px; max-width: 420px; margin: 0 auto; }
        .input-row input { flex: 1; padding: 13px 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .input-row input:focus { border-color: #00d4ff; }
        .input-row input::placeholder { color: #555; }
        .btn { padding: 13px 22px; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-join { background: linear-gradient(90deg, #00d4ff, #7c3aed); color: #fff; }
        .btn-leave { background: rgba(255,100,100,0.2); color: #f87171; border: 1px solid rgba(255,100,100,0.3); font-size: 0.85rem; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        .channel-info { display: none; padding: 10px 20px; background: rgba(0,212,255,0.08); border-bottom: 1px solid rgba(0,212,255,0.15); align-items: center; justify-content: space-between; }
        .channel-info.show { display: flex; }
        .channel-name { font-size: 0.9rem; color: #00d4ff; }
        .online-count { font-size: 0.82rem; color: #888; }
        .online-count span { color: #4ade80; font-weight: 600; }

        .talk-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; }
        .talk-btn {
            width: 190px; height: 190px; border-radius: 50%; border: none;
            background: radial-gradient(circle at 35% 35%, #2d2d5a, #1a1a2e);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 -4px 16px rgba(0,0,0,0.4);
            cursor: pointer; transition: all 0.12s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .talk-btn .icon { font-size: 3.8rem; }
        .talk-btn .label { font-size: 0.95rem; color: #666; font-weight: 500; }
        .talk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .talk-btn.active { background: radial-gradient(circle at 35% 35%, #cc2222, #880000); box-shadow: 0 0 60px rgba(255,50,50,0.5); transform: scale(0.96); }
        .talk-btn.active .label { color: #ffaaaa; }
        .talk-hint { margin-top: 24px; font-size: 0.82rem; color: #444; text-align: center; line-height: 1.8; }
        .encrypt-indicator { display: flex; align-items: center; gap: 6px; margin-top: 16px; font-size: 0.78rem; color: #4ade80; }
        .encrypt-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pg 2s infinite; }
        @keyframes pg { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .log-section { background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; max-height: 130px; overflow-y: auto; }
        .log-entry { font-size: 0.75rem; padding: 3px 0; color: #555; }
        .log-entry.join { color: #60a5fa; }
        .log-entry.leave { color: #f87171; }
        .log-entry.speak { color: #4ade80; }
        .log-entry.error { color: #f87171; }
        .log-entry.secure { color: #a78bfa; }

        .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.95); color: #fff; padding: 11px 22px; border-radius: 12px; font-size: 0.88rem; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; animation: ti 0.3s ease; }
        @keyframes ti { from{opacity:0;transform:translateX(-50%) translateY(-15px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
<header>
    <h1>📻 对讲机 <span class="secure-badge">🔒 加密</span></h1>
    <div class="status-bar" id="status">就绪</div>
</header>

<div class="join-section" id="joinSection">
    <div class="input-row">
        <input type="text" id="channelInput" placeholder="输入频道号（如: family2026）" maxlength="30" autocomplete="off">
        <button class="btn btn-join" onclick="joinChannel()">加入</button>
    </div>
</div>

<div class="channel-info" id="channelInfo">
    <div class="channel-name" id="channelName">📻 -</div>
    <div style="display:flex;align-items:center;gap:12px">
        <div class="online-count">在线 <span id="userCount">1</span> 人</div>
        <button class="btn-leave" onclick="leaveChannel()">离开</button>
    </div>
</div>

<div class="talk-section">
    <button class="talk-btn" id="talkBtn" disabled>
        <span class="icon">🎙️</span>
        <span class="label">按住说话</span>
    </button>
    <div class="talk-hint" id="talkHint">请先加入频道</div>
    <div class="encrypt-indicator" id="encryptIndicator" style="display:none">
        <div class="encrypt-dot"></div> 端对端加密已启用
    </div>
</div>

<div class="log-section" id="logSection">
    <div class="log-entry">系统就绪</div>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
    const PUSHER_KEY = '8e6caec8bd3839137a9b';
    const PUSHER_CLUSTER = 'ap3';

    let pusher = null, ch = null;
    let myId = 'u_' + Math.random().toString(36).substr(2, 8);
    let currentChannel = '';
    let peers = new Map();
    let localStream = null;
    let isTalking = false;
    let onlineUsers = new Set();

    const statusEl = document.getElementById('status');
    const talkBtn = document.getElementById('talkBtn');

    function addLog(msg, type='') {
        const el = document.createElement('div');
        el.className = 'log-entry ' + type;
        el.textContent = '[' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + '] ' + msg;
        document.getElementById('logSection').insertBefore(el, document.getElementById('logSection').firstChild);
    }

    function showToast(msg) {
        document.querySelector('.toast')?.remove();
        const t = document.createElement('div');
        t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function updateCount() {
        document.getElementById('userCount').textContent = onlineUsers.size + 1;
    }

    // ===== WebRTC =====
    const RTC_CONFIG = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    function createPC(peerId) {
        if (peers.has(peerId)) return peers.get(peerId);
        const pc = new RTCPeerConnection(RTC_CONFIG);
        peers.set(peerId, pc);

        if (localStream) {
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }

        pc.ontrack = (e) => {
            addLog('🔊 收到对方音频', 'join');
            const audio = new Audio();
            audio.srcObject = e.streams[0];
            audio.play().catch(err => addLog('播放失败:' + err.message, 'error'));
            statusEl.textContent = '🔵 对方正在说话...';
            statusEl.className = 'status-bar receiving';
            e.streams[0].getTracks()[0].onended = () => {
                if (!isTalking) {
                    statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
                    statusEl.className = 'status-bar online';
                }
            };
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                ch.trigger('client-signal', { to: peerId, from: myId, type: 'candidate', candidate: e.candidate });
            }
        };

        pc.onconnectionstatechange = () => {
            addLog('连接状态: ' + pc.connectionState, pc.connectionState === 'connected' ? 'join' : '');
            if (pc.connectionState === 'connected') {
                showToast('✅ 连接成功！可以说话了');
            }
            if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                peers.delete(peerId);
                onlineUsers.delete(peerId);
                updateCount();
            }
        };

        return pc;
    }

    async function makeOffer(peerId) {
        const pc = createPC(peerId);
        const offer = await pc.createOffer({ offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        ch.trigger('client-signal', { to: peerId, from: myId, type: 'offer', sdp: offer });
        addLog('发起连接到: ' + peerId.substr(0,8), '');
    }

    async function handleSignal(data) {
        if (data.to !== myId) return;
        const fromId = data.from;

        if (data.type === 'offer') {
            const pc = createPC(fromId);
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ch.trigger('client-signal', { to: fromId, from: myId, type: 'answer', sdp: answer });
            addLog('接受连接请求', '');
        } else if (data.type === 'answer') {
            const pc = peers.get(fromId);
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        } else if (data.type === 'candidate') {
            const pc = peers.get(fromId);
            if (pc && pc.remoteDescription) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        } else if (data.type === 'hello') {
            // 对方加入了，我向对方发起连接
            onlineUsers.add(fromId);
            updateCount();
            addLog('新用户加入: ' + fromId.substr(0,8), 'join');
            await makeOffer(fromId);
        } else if (data.type === 'bye') {
            onlineUsers.delete(fromId);
            updateCount();
            if (peers.has(fromId)) { peers.get(fromId).close(); peers.delete(fromId); }
            addLog('用户离开', 'leave');
        }
    }

    // ===== 加入频道 =====
    async function joinChannel() {
        const name = document.getElementById('channelInput').value.trim();
        if (!name) { showToast('请输入频道号'); return; }
        if (name.length < 4) { showToast('频道号至少4位'); return; }

        localStorage.setItem('lastChannel', name);
        currentChannel = name;

        // 获取麦克风
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true },
                video: false
            });
            localStream.getAudioTracks().forEach(t => t.enabled = false);
            addLog('麦克风就绪', '');
        } catch(e) {
            showToast('❌ 请允许麦克风权限');
            return;
        }

        // 连接 Pusher
        pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER, forceTLS: true });

        // 用频道号的哈希作为 Pusher 频道名
        const chHash = await hashStr(name);
        ch = pusher.subscribe('private-' + chHash);

        // 注意：private 频道也需要后端，改用普通频道
        // 重新订阅普通频道
        pusher.unsubscribe('private-' + chHash);
        ch = pusher.subscribe('walkie-' + chHash);

        ch.bind('pusher:subscription_succeeded', () => {
            addLog('已加入频道', 'join');
            // 广播自己加入
            ch.trigger('client-signal', { to: 'all', from: myId, type: 'hello' });
        });

        ch.bind('client-signal', async (data) => {
            if (data.to === 'all' && data.from !== myId && data.type === 'hello') {
                // 有人广播加入，记录并向对方发起连接
                onlineUsers.add(data.from);
                updateCount();
                addLog('发现用户: ' + data.from.substr(0,8), 'join');
                await makeOffer(data.from);
                // 回复自己也在
                ch.trigger('client-signal', { to: data.from, from: myId, type: 'hello' });
            } else {
                await handleSignal(data);
            }
        });

        pusher.connection.bind('connected', () => {
            statusEl.textContent = '📻 ' + name + ' · 空闲';
            statusEl.className = 'status-bar online';
            showToast('✅ 已加入: ' + name);
        });

        // 更新 UI
        document.getElementById('joinSection').classList.add('hidden');
        document.getElementById('channelInfo').classList.add('show');
        document.getElementById('channelName').textContent = '📻 ' + name;
        talkBtn.disabled = false;
        document.getElementById('talkHint').textContent = '按住大按钮说话 · 松开停止';
        document.getElementById('encryptIndicator').style.display = 'flex';
    }

    async function hashStr(str) {
        const enc = new TextEncoder();
        const hash = await crypto.subtle.digest('SHA-256', enc.encode(str));
        return Array.from(new Uint8Array(hash)).slice(0,8).map(b=>b.toString(16).padStart(2,'0')).join('');
    }

    // ===== 离开 =====
    function leaveChannel() {
        if (isTalking) stopTalking();
        // 广播离开
        if (ch) ch.trigger('client-signal', { to: 'all', from: myId, type: 'bye' });
        peers.forEach(pc => pc.close()); peers.clear();
        onlineUsers.clear();
        if (pusher) { pusher.disconnect(); pusher = null; ch = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        currentChannel = '';
        document.getElementById('joinSection').classList.remove('hidden');
        document.getElementById('channelInfo').classList.remove('show');
        talkBtn.disabled = true;
        document.getElementById('talkHint').textContent = '请先加入频道';
        document.getElementById('encryptIndicator').style.display = 'none';
        statusEl.textContent = '已就绪'; statusEl.className = 'status-bar online';
        document.getElementById('userCount').textContent = '1';
        showToast('已离开频道');
    }

    // ===== 说话 =====
    function startTalking() {
        if (isTalking || !localStream || talkBtn.disabled) return;
        isTalking = true;
        localStream.getAudioTracks().forEach(t => t.enabled = true);
        talkBtn.classList.add('active');
        talkBtn.querySelector('.icon').textContent = '🔴';
        talkBtn.querySelector('.label').textContent = '正在说话...';
        statusEl.textContent = '🔴 我正在说话...';
        statusEl.className = 'status-bar speaking';
    }

    function stopTalking() {
        if (!isTalking) return;
        isTalking = false;
        localStream.getAudioTracks().forEach(t => t.enabled = false);
        talkBtn.classList.remove('active');
        talkBtn.querySelector('.icon').textContent = '🎙️';
        talkBtn.querySelector('.label').textContent = '按住说话';
        statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
        statusEl.className = 'status-bar online';
    }

    talkBtn.addEventListener('mousedown', e => { e.preventDefault(); startTalking(); });
    talkBtn.addEventListener('mouseup', e => { e.preventDefault(); stopTalking(); });
    talkBtn.addEventListener('mouseleave', () => { if (isTalking) stopTalking(); });
    talkBtn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); }, { passive: false });
    talkBtn.addEventListener('touchend', e => { e.preventDefault(); stopTalking(); }, { passive: false });
    talkBtn.addEventListener('touchcancel', e => { e.preventDefault(); stopTalking(); }, { passive: false });

    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); startTalking(); }
    });
    document.addEventListener('keyup', e => {
        if (e.code === 'Space') { e.preventDefault(); stopTalking(); }
    });
    document.addEventListener('visibilitychange', () => { if (document.hidden && isTalking) stopTalking(); });
    document.getElementById('channelInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinChannel(); });

    const last = localStorage.getItem('lastChannel');
    if (last) document.getElementById('channelInput').value = last;
</script>
</body>
</html>
