<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>📻 对讲机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; display: flex; flex-direction: column; color: #fff;
        }
        header { padding: 16px 20px; text-align: center; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 1.4rem; }
        .secure-badge { font-size: 0.7rem; background: linear-gradient(90deg, #4ade80, #22c55e); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 8px; }
        .status-bar { margin-top: 6px; font-size: 0.82rem; color: #888; }
        .status-bar.online { color: #4ade80; }
        .status-bar.speaking { color: #f87171; animation: blink 0.6s infinite; }
        .status-bar.receiving { color: #60a5fa; animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .join-section { padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .join-section.hidden { display: none; }
        .join-input { display: flex; gap: 10px; max-width: 400px; margin: 0 auto; }
        .join-input input { flex: 1; padding: 14px 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .join-input input:focus { border-color: #00d4ff; }
        .join-input input::placeholder { color: #555; }
        .join-input button { padding: 14px 24px; background: linear-gradient(90deg, #00d4ff, #7c3aed); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }

        .conn-info { padding: 12px 20px; background: rgba(0,212,255,0.08); border-bottom: 1px solid rgba(0,212,255,0.15); display: none; align-items: center; justify-content: space-between; }
        .conn-info.show { display: flex; }
        .conn-info .ch { color: #00d4ff; font-size: 0.9rem; }
        .conn-info .online { font-size: 0.82rem; color: #888; }
        .conn-info .online span { color: #4ade80; font-weight: 600; }
        .conn-info .leave { background: rgba(255,100,100,0.2); color: #f87171; padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,100,100,0.3); cursor: pointer; font-size: 0.85rem; }

        .talk-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; }
        .talk-btn {
            width: 190px; height: 190px; border-radius: 50%; border: none;
            background: radial-gradient(circle at 35% 35%, #2d2d5a, #1a1a2e);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 -4px 16px rgba(0,0,0,0.4);
            cursor: pointer; transition: all 0.12s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .talk-btn .icon { font-size: 3.8rem; }
        .talk-btn .label { font-size: 0.95rem; color: #666; font-weight: 500; }
        .talk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .talk-btn.active { background: radial-gradient(circle at 35% 35%, #cc2222, #880000); box-shadow: 0 0 60px rgba(255,50,50,0.5); transform: scale(0.96); }
        .talk-btn.active .label { color: #ffaaaa; }
        .talk-hint { margin-top: 24px; font-size: 0.82rem; color: #444; text-align: center; line-height: 1.8; }

        .log-section { background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.08); padding: 12px 16px; max-height: 130px; overflow-y: auto; }
        .log-section::-webkit-scrollbar { width: 3px; }
        .log-section::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .log-entry { font-size: 0.75rem; padding: 3px 0; color: #555; }
        .log-entry.ok { color: #4ade80; }
        .log-entry.err { color: #f87171; }
        .log-entry.info { color: #60a5fa; }

        .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(10,10,20,0.95); color: #fff; padding: 11px 22px; border-radius: 12px; font-size: 0.88rem; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; animation: ti 0.3s ease; }
        @keyframes ti { from{opacity:0;transform:translateX(-50%) translateY(-15px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
<header>
    <h1>📻 对讲机<span class="secure-badge">🔒 加密</span></h1>
    <div class="status-bar" id="status">就绪</div>
</header>

<div class="join-section" id="joinSection">
    <div class="join-input">
        <input type="text" id="chInput" placeholder="输入频道号（如: family2026）" maxlength="20" autocomplete="off">
        <button onclick="joinChannel()">加入</button>
    </div>
</div>

<div class="conn-info" id="connInfo">
    <div class="ch" id="chName">📻 -</div>
    <div style="display:flex;align-items:center;gap:12px">
        <div class="online">在线 <span id="onlineCount">1</span> 人</div>
        <div class="leave" onclick="leaveChannel()">离开</div>
    </div>
</div>

<div class="talk-section">
    <button class="talk-btn" id="talkBtn" disabled>
        <span class="icon">🎙️</span>
        <span class="label">按住说话</span>
    </button>
    <div class="talk-hint" id="hint">请先加入频道</div>
</div>

<div class="log-section" id="logSection">
    <div class="log-entry">系统就绪</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ===== Supabase 配置 =====
    const SUPABASE_URL = 'https://hogtlfhzaptjmdofirpc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3RsZmh6YXB0am1kb2ZpcnBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Mzk0MDgsImV4cCI6MjA5MDAxNTQwOH0.uWntVROe6VLzr6Uoqz57HoQ48NgmqJFy-UgE0sZ1ezI';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== 状态 =====
    let myId = 'u_' + Math.random().toString(36).substr(2, 8);
    let currentChannel = '';
    let sbChannel = null;
    let peers = new Map(); // peerId -> RTCPeerConnection
    let localStream = null;
    let isTalking = false;
    let onlineUsers = new Set();

    const statusEl = document.getElementById('status');
    const talkBtn = document.getElementById('talkBtn');

    function addLog(msg, type='') {
        const el = document.createElement('div');
        el.className = 'log-entry ' + type;
        const t = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        el.textContent = `[${t}] ${msg}`;
        document.getElementById('logSection').insertBefore(el, document.getElementById('logSection').firstChild);
    }

    function showToast(msg) {
        document.querySelector('.toast')?.remove();
        const t = document.createElement('div');
        t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function updateCount() {
        document.getElementById('onlineCount').textContent = onlineUsers.size + 1;
    }

    // ===== WebRTC =====
    const RTC_CONFIG = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun.cloudflare.com:3478' }
        ]
    };

    function createPC(peerId) {
        if (peers.has(peerId)) return peers.get(peerId);

        const pc = new RTCPeerConnection(RTC_CONFIG);
        peers.set(peerId, pc);

        // 添加本地音频
        if (localStream) {
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }

        // 收到对方音频
        pc.ontrack = (e) => {
            addLog('🔊 收到对方音频', 'ok');
            const audio = new Audio();
            audio.srcObject = e.streams[0];
            audio.play().catch(err => addLog('播放失败: ' + err.message, 'err'));
            talkBtn.classList.add('receiving');
            statusEl.textContent = '🔵 对方正在说话...';
            statusEl.className = 'status-bar receiving';
            e.streams[0].getTracks()[0].onended = () => {
                if (!isTalking) {
                    statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
                    statusEl.className = 'status-bar online';
                }
            };
        };

        // ICE 候选 - 通过 Supabase 发送
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                sendSignal(peerId, { type: 'candidate', candidate: e.candidate });
            }
        };

        pc.onconnectionstatechange = () => {
            addLog('连接状态: ' + pc.connectionState, pc.connectionState === 'connected' ? 'ok' : '');
            if (pc.connectionState === 'connected') {
                showToast('✅ 连接成功！可以说话了');
                statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
                statusEl.className = 'status-bar online';
                talkBtn.disabled = false;
                document.getElementById('hint').textContent = '按住大按钮说话，松开停止\nPC端可按空格键';
            }
            if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                peers.delete(peerId);
                onlineUsers.delete(peerId);
                updateCount();
                addLog('连接断开: ' + peerId.substr(0,8), 'err');
            }
        };

        return pc;
    }

    // ===== 通过 Supabase 发送信令 =====
    function sendSignal(to, signal) {
        if (sbChannel) {
            sbChannel.send({
                type: 'broadcast',
                event: 'signal',
                payload: { from: myId, to: to, signal: signal }
            });
        }
    }

    function broadcastSignal(event, payload) {
        if (sbChannel) {
            sbChannel.send({
                type: 'broadcast',
                event: event,
                payload: { from: myId, ...payload }
            });
        }
    }

    // ===== 处理 WebRTC 信令 =====
    async function handleSignal(from, signal) {
        if (signal.type === 'offer') {
            addLog('收到连接请求', 'info');
            const pc = createPC(from);
            await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal(from, { type: 'answer', sdp: answer });

        } else if (signal.type === 'answer') {
            const pc = peers.get(from);
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                addLog('连接应答成功', 'ok');
            }

        } else if (signal.type === 'candidate') {
            const pc = peers.get(from);
            if (pc && pc.remoteDescription) {
                await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
            }
        }
    }

    // ===== 向新用户发起连接 =====
    async function makeOffer(peerId) {
        addLog('向对方发起连接...', 'info');
        const pc = createPC(peerId);
        const offer = await pc.createOffer({ offerToReceiveAudio: true });
        await pc.setLocalDescription(offer);
        sendSignal(peerId, { type: 'offer', sdp: offer });
    }

    // ===== 加入频道 =====
    async function joinChannel() {
        const ch = document.getElementById('chInput').value.trim();
        if (!ch) { showToast('请输入频道号'); return; }
        if (ch.length < 2) { showToast('频道号至少2位'); return; }

        localStorage.setItem('lastCh', ch);
        currentChannel = ch;

        // 获取麦克风
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
                video: false
            });
            localStream.getAudioTracks().forEach(t => t.enabled = false);
            addLog('麦克风就绪', 'ok');
        } catch(e) {
            showToast('❌ 请允许麦克风权限');
            addLog('麦克风权限被拒绝', 'err');
            return;
        }

        // 订阅 Supabase Realtime 频道
        sbChannel = supabase.channel('walkie_' + ch, {
            config: { broadcast: { self: false } }
        });

        // 监听信令消息
        sbChannel.on('broadcast', { event: 'signal' }, ({ payload }) => {
            if (payload.to === myId) {
                handleSignal(payload.from, payload.signal);
            }
        });

        // 监听用户加入
        sbChannel.on('broadcast', { event: 'join' }, ({ payload }) => {
            if (payload.from !== myId) {
                addLog('新用户加入: ' + payload.from.substr(0,8), 'ok');
                onlineUsers.add(payload.from);
                updateCount();
                // 向新用户发起连接
                makeOffer(payload.from);
            }
        });

        // 监听用户离开
        sbChannel.on('broadcast', { event: 'leave' }, ({ payload }) => {
            if (payload.from !== myId) {
                addLog('用户离开', 'err');
                onlineUsers.delete(payload.from);
                if (peers.has(payload.from)) {
                    peers.get(payload.from).close();
                    peers.delete(payload.from);
                }
                updateCount();
                if (peers.size === 0) {
                    talkBtn.disabled = true;
                    document.getElementById('hint').textContent = '等待对方加入...';
                    statusEl.textContent = '📻 ' + ch + ' · 等待对方';
                }
            }
        });

        // 订阅成功后广播自己加入
        sbChannel.subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                addLog('已加入频道: ' + ch, 'ok');
                // 广播自己加入
                broadcastSignal('join', {});
                showToast('✅ 已加入: ' + ch);
                statusEl.textContent = '📻 ' + ch + ' · 等待对方...';
                statusEl.className = 'status-bar online';
            } else if (status === 'CHANNEL_ERROR') {
                addLog('频道连接失败', 'err');
                showToast('❌ 连接失败，请重试');
            }
        });

        // 更新 UI
        document.getElementById('joinSection').classList.add('hidden');
        document.getElementById('connInfo').classList.add('show');
        document.getElementById('chName').textContent = '📻 ' + ch;
        document.getElementById('hint').textContent = '等待对方加入...';
    }

    // ===== 离开频道 =====
    function leaveChannel() {
        if (isTalking) stopTalking();

        // 广播离开
        broadcastSignal('leave', {});

        // 关闭所有连接
        peers.forEach(pc => pc.close());
        peers.clear();
        onlineUsers.clear();

        // 取消订阅
        if (sbChannel) {
            supabase.removeChannel(sbChannel);
            sbChannel = null;
        }

        // 停止麦克风
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }

        currentChannel = '';
        document.getElementById('joinSection').classList.remove('hidden');
        document.getElementById('connInfo').classList.remove('show');
        talkBtn.disabled = true;
        document.getElementById('hint').textContent = '请先加入频道';
        document.getElementById('onlineCount').textContent = '1';
        statusEl.textContent = '就绪';
        statusEl.className = 'status-bar';
        addLog('已离开频道', 'info');
        showToast('已离开频道');
    }

    // ===== 说话 =====
    function startTalking() {
        if (isTalking || !localStream || talkBtn.disabled) return;
        isTalking = true;
        localStream.getAudioTracks().forEach(t => t.enabled = true);
        talkBtn.classList.add('active');
        talkBtn.querySelector('.icon').textContent = '🔴';
        talkBtn.querySelector('.label').textContent = '正在说话...';
        statusEl.textContent = '🔴 我正在说话...';
        statusEl.className = 'status-bar speaking';
    }

    function stopTalking() {
        if (!isTalking) return;
        isTalking = false;
        localStream.getAudioTracks().forEach(t => t.enabled = false);
        talkBtn.classList.remove('active');
        talkBtn.querySelector('.icon').textContent = '🎙️';
        talkBtn.querySelector('.label').textContent = '按住说话';
        statusEl.textContent = '📻 ' + currentChannel + ' · 空闲';
        statusEl.className = 'status-bar online';
    }

    // ===== 事件绑定 =====
    talkBtn.addEventListener('mousedown', e => { e.preventDefault(); startTalking(); });
    talkBtn.addEventListener('mouseup', e => { e.preventDefault(); stopTalking(); });
    talkBtn.addEventListener('mouseleave', () => { if (isTalking) stopTalking(); });
    talkBtn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); }, { passive: false });
    talkBtn.addEventListener('touchend', e => { e.preventDefault(); stopTalking(); }, { passive: false });
    talkBtn.addEventListener('touchcancel', e => { e.preventDefault(); stopTalking(); }, { passive: false });

    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); startTalking(); }
    });
    document.addEventListener('keyup', e => {
        if (e.code === 'Space') { e.preventDefault(); stopTalking(); }
    });
    document.addEventListener('visibilitychange', () => { if (document.hidden && isTalking) stopTalking(); });
    document.getElementById('chInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinChannel(); });

    // 自动填入上次频道号
    const last = localStorage.getItem('lastCh');
    if (last) document.getElementById('chInput').value = last;
</script>
</body>
</html>
